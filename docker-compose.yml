

services:
 sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: ecommerce-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPassword123!
    
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
 api:
    build: .
    container_name: ecommerce-api
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__Default=Server=sqlserver;Database=EcommerceV1.00;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True
 

volumes:
  sql_data:
